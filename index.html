<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Basura</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #38bdf8;
}

form {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
}

input, textarea, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #38bdf8;
  color: black;
  font-weight: bold;
}

.card {
  background: #1e293b;
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
}

#puntos {
  font-size: 18px;
  margin-top: 10px;
  color: #22c55e;
}
</style>
</head>

<body>

<h1>♻️ Reporte de Basura</h1>

<div id="puntos">Puntos: 0</div>

<form id="form">
<input type="text" id="nombre" placeholder="Tu nombre" required>
<textarea id="descripcion" placeholder="Describe el problema..." required></textarea>
<input type="file" id="foto" accept="image/*">

<button type="button" onclick="ubicacion()">Obtener ubicación</button>
<div id="ubi"></div>

<button type="submit">Enviar reporte</button>
</form>

<h2>🎁 Recompensas</h2>

<button onclick="canjear(50)">Canjear cupón (50 pts)</button>
<button onclick="canjear(100)">Transporte (100 pts)</button>

<div id="resultados"></div>

<script>
let lat, lon;
let puntos = localStorage.getItem("puntos") || 0;
document.getElementById("puntos").innerText = "Puntos: " + puntos;

function ubicacion() {
  navigator.geolocation.getCurrentPosition(pos => {
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    document.getElementById("ubi").innerText =
      lat + ", " + lon;
  });
}

document.getElementById("form").addEventListener("submit", e => {
  e.preventDefault();

  const nombre = document.getElementById("nombre").value;
  const descripcion = document.getElementById("descripcion").value;

  const fecha = new Date().toLocaleString();

  puntos = parseInt(puntos) + 10;
  localStorage.setItem("puntos", puntos);

  document.getElementById("puntos").innerText = "Puntos: " + puntos;

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <b>${nombre}</b><br>
    ${descripcion}<br>
    🕒 ${fecha}<br>
    📍 ${lat || "sin ubicación"}
  `;

  document.getElementById("resultados").appendChild(card);

  document.getElementById("form").reset();
});

function canjear(costo) {
  if (puntos >= costo) {
    puntos -= costo;
    localStorage.setItem("puntos", puntos);
    document.getElementById("puntos").innerText = "Puntos: " + puntos;

    alert("🎉 Recompensa obtenida!");
  } else {
    alert("❌ No tienes suficientes puntos");
  }
}
</script>

</body>
</html>
